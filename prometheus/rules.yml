groups:
  - name: rules
    rules:
      - alert: Node down
        expr: up{} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          title: "Node {{ $labels.instance }} is down"
          description: |
            Failed to scrape {{ $labels.job }} on {{ $labels.instance }} for more than 10 minutes. Node seems down.

      - alert: HostOutOfMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Host out of memory (instance {{ $labels.instance }})"
          description: |
            Node memory is filling up (< 15% left)
            VALUE = {{ $value }}

      - alert: HostMemoryUnderMemoryPressure
        expr: rate(node_vmstat_pgmajfault[10m]) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory under memory pressure (instance {{ $labels.instance }})"
          description: |
            The node is under heavy memory pressure. High rate of major page faults
            VALUE = {{ $value }}

      - alert: HostUnusualNetworkThroughputOut
        expr: sum by (instance) (rate(node_network_transmit_bytes_total[10m])) / 1024 / 1024 > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host unusual network throughput out (instance {{ $labels.instance }})"
          description: |
            Host network interfaces are probably sending too much data (> 100 MB/s)
            VALUE = {{ $value }}

      - alert: HostUnusualDiskReadRate
        expr: sum by (instance) (rate(node_disk_read_bytes_total[10m])) / 1024 / 1024 > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host unusual disk read rate (instance {{ $labels.instance }})"
          description: |
            Disk is probably reading too much data (> 1000 MB/s)
            VALUE = {{ $value }}

      - alert: HostUnusualDiskWriteRate
        expr: sum by (instance) (rate(node_disk_written_bytes_total[2m])) / 1024 / 1024 > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host unusual disk write rate (instance {{ $labels.instance }})"
          description: |
            Disk is probably writing too much data (> 100 MB/s)
            VALUE = {{ $value }}

      - alert: HostOutOfDiskSpace
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 4 and ON (instance, device, mountpoint) node_filesystem_readonly == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host out of disk space (instance {{ $labels.instance }})"
          description: |
            Disk is almost full (< 4% left)
            VALUE = {{ $value }}

      - alert: HostDiskWillFillIn24Hours
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 10 and ON (instance, device, mountpoint) predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs"}[1h], 24 * 3600) < 0 and ON (instance, device, mountpoint) node_filesystem_readonly == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk will fill in 24 hours (instance {{ $labels.instance }})"
          description: |
            Filesystem is predicted to run out of space within the next 24 hours at current write rate
            VALUE = {{ $value }}

      - alert: HostOutOfInodes
        expr: node_filesystem_files_free{mountpoint ="/rootfs"} / node_filesystem_files{mountpoint="/rootfs"} * 100 < 10 and ON (instance, device, mountpoint) node_filesystem_readonly{mountpoint="/rootfs"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host out of inodes (instance {{ $labels.instance }})"
          description: |
            Disk is almost running out of available inodes (< 10% left)
            VALUE = {{ $value }}

      - alert: HostInodesWillFillIn24Hours
        expr: node_filesystem_files_free{mountpoint ="/rootfs"} / node_filesystem_files{mountpoint="/rootfs"} * 100 < 10 and predict_linear(node_filesystem_files_free{mountpoint="/rootfs"}[1h], 24 * 3600) < 0 and ON (instance, device, mountpoint) node_filesystem_readonly{mountpoint="/rootfs"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host inodes will fill in 24 hours (instance {{ $labels.instance }})"
          description: |
            Filesystem is predicted to run out of inodes within the next 24 hours at current write rate
            VALUE = {{ $value }}

      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]) * 100)) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host high CPU load (instance {{ $labels.instance }})"
          description: |
            CPU load is > 85%
            VALUE = {{ $value }}

      - alert: HostSwapIsFillingUp
        expr: (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host swap is filling up (instance {{ $labels.instance }})"
          description: |
            Swap is filling up (>85%)
            VALUE = {{ $value }}

      - alert: HostSystemdServiceCrashed
        expr: node_systemd_unit_state{state="failed"} == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Host SystemD service crashed (instance {{ $labels.instance }})"
          description: |
            SystemD service crashed
            VALUE = {{ $value }}

      - alert: HostPhysicalComponentTooHot
        expr: node_hwmon_temp_celsius > 75
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host physical component too hot (instance {{ $labels.instance }})"
          description: |
            Physical hardware component too hot
            VALUE = {{ $value }}

      - alert: HostOomKillDetected
        expr: increase(node_vmstat_oom_kill[1m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host OOM kill detected (instance {{ $labels.instance }})"
          description: |
            OOM kill detected
            VALUE = {{ $value }}

      - alert: HostNetworkReceiveErrors
        expr: rate(node_network_receive_errs_total[5m]) / rate(node_network_receive_packets_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host Network Receive Errors (instance {{ $labels.instance }}:{{ $labels.device }})"
          description: |
            Instance interface has encountered {{ printf "%.0f" $value }} receive errors in the last five minutes.
            VALUE = {{ $value }}

      - alert: HostNetworkTransmitErrors
        expr: rate(node_network_transmit_errs_total[5m]) / rate(node_network_transmit_packets_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host Network Transmit Errors (instance {{ $labels.instance }}:{{ $labels.device }})"
          description: |
            Instance has encountered {{ printf "%.0f" $value }} transmit errors in the last five minutes.
            VALUE = {{ $value }}

      - alert: HostNetworkInterfaceSaturated
        expr: (rate(node_network_receive_bytes_total{device!~"^tap.*"}[1m]) + rate(node_network_transmit_bytes_total{device!~"^tap.*"}[1m])) / node_network_speed_bytes{device!~"^tap.*"} > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host Network Interface Saturated (instance {{ $labels.instance }}:{{ $labels.interface }})"
          description: |
            The network interface is getting overloaded.
            VALUE = {{ $value }}

      - alert: HostConntrackLimit
        expr: node_nf_conntrack_entries / node_nf_conntrack_entries_limit > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host conntrack limit (instance {{ $labels.instance }})"
          description: |
            The number of conntrack is approching limit
            VALUE = {{ $value }}

      - alert: NginxDown
        expr: nginx_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nginx instance down"
          description: |
            Nginx on {{ $labels.instance }} has been down for more than 1 minute.

      - alert: HighNginxRequests
        expr: rate(nginx_http_requests_total[5m]) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Nginx Traffic"
          description: |
            Nginx is receiving high traffic (>100 req/sec). 
  
      - alert: ContainerKilled
        expr: time() - container_last_seen{name!=""} > 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Container killed: {{ $labels.name }} on {{ $labels.instance }}"
          description: |
            Container {{ $labels.name }} (image: {{ $labels.image }}) has disappeared or stopped.
            VALUE = {{ $value }}

      - alert: ContainerHighMemoryUsage
        expr: (sum by (instance, name) (container_memory_working_set_bytes{name!=""}) / sum by (instance, name) (container_spec_memory_limit_bytes{name!=""} > 0)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container High Memory usage (instance {{ $labels.instance }})"
          description: |
            Container {{ $labels.name }} memory usage is above 80% of its limit.
            VALUE = {{ $value }}

      - alert: ContainerVolumeUsage
        expr: (sum by (instance, name) (container_fs_usage_bytes{name!=""}) / sum by (instance, name) (container_fs_limit_bytes{name!=""})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container Volume usage is high (instance {{ $labels.instance }})"
          description: |
            Container {{ $labels.name }} has used more than 85% of its filesystem limits.
            VALUE = {{ $value }}   

      - alert: HostUnreachable
        expr: probe_success{job="icmp_ping"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Host unreachable: {{ $labels.instance }}"
          description: |
            ICMP ping to {{ $labels.instance }} has been failing for 2 minutes.
            The host may be down, powered off, or blocking ICMP traffic.
            VALUE = {{ $value }}

      - alert: HighPingLatency
        expr: probe_duration_seconds{job="icmp_ping"} > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High ping latency to {{ $labels.instance }}"
          description: |
            ICMP round-trip to {{ $labels.instance }} is {{ $value | humanizeDuration }}.
            Threshold: 200ms. This may indicate network congestion or
            a degraded link between the monitoring host and target.

      - alert: WazuhHostUnreachable
        expr: probe_success{job="icmp_ping", instance="192.168.106.130"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Wazuh host unreachable: 192.168.106.130"
          description: |
            The Wazuh / OpenSearch host (192.168.106.130) is not responding
            to ICMP pings for 2 minutes. Wazuh security monitoring and
            the OpenSearch datasource in Grafana may be affected.
            VALUE = {{ $value }}

      - alert: VirtualHostDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Virtual host DOWN: {{ $labels.instance }}"
          description: |
            HTTP probe to {{ $labels.instance }} is failing for 2 minutes.
            Apache may be running but this specific virtual host or site
            path is returning no valid response.
            VALUE = {{ $value }}

      - alert: VirtualHostHttpError
        expr: probe_http_status_code{job="blackbox-http"} >= 400
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HTTP {{ $value }} error on {{ $labels.instance }}"
          description: |
            {{ $labels.instance }} returned HTTP status {{ $value }}.
            Apache is running but this virtual host has an application error.
            Check the Apache error log and the application backend.

      - alert: VirtualHostSlowResponse
        expr: probe_duration_seconds{job="blackbox-http"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response on {{ $labels.instance }}"
          description: |
            {{ $labels.instance }} is taking {{ $value | humanizeDuration }}
            to respond. Threshold: 2 seconds.
            Check application performance, database connections, or
            backend processing on the Apache virtual host.

      - alert: HttpsSiteDown
        expr: probe_success{job="blackbox-https"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HTTPS site DOWN: {{ $labels.instance }}"
          description: |
            HTTPS probe to {{ $labels.instance }} is failing for 2 minutes.
            Possible causes: site is down, SSL handshake failed,
            certificate invalid or expired, DNS not resolving.
            VALUE = {{ $value }}

      - alert: SSLCertExpiringSoon30Days
        expr: (probe_ssl_earliest_cert_expiry{job="blackbox-https"} - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL cert expires in < 30 days: {{ $labels.instance }}"
          description: |
            The SSL certificate for {{ $labels.instance }} will expire in {{ printf "%.0f" $value }} days.
            Renew the certificate before it expires to avoid browser security warnings and site downtime.

      - alert: SSLCertExpiringSoon7Days
        expr: (probe_ssl_earliest_cert_expiry{job="blackbox-https"} - time()) / 86400 < 7
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "URGENT — SSL cert expires in < 7 days: {{ $labels.instance }}"
          description: |
            CRITICAL: The SSL certificate for {{ $labels.instance }} expires in {{ printf "%.0f" $value }} days.
            Certificate renewal is OVERDUE. Users will see browser warnings in days.

      - alert: SSLCertExpired
        expr: probe_ssl_earliest_cert_expiry{job="blackbox-https"} - time() <= 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "SSL CERT EXPIRED: {{ $labels.instance }}"
          description: |
            The SSL certificate for {{ $labels.instance }} has already EXPIRED.
            All browser connections will show security errors.
            Renew the certificate IMMEDIATELY.

      - alert: SSHServiceDown
        expr: probe_success{job="ssh_probe"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SSH service down: {{ $labels.instance }}"
          description: |
            SSH on {{ $labels.instance }} is not responding or not returning
            the expected SSH-2.0 banner for 2 minutes.
            Possible causes: sshd crashed, firewall rule blocking port 22,
            or wrong service running on port 22.
            Run: systemctl status sshd on the target host.
            VALUE = {{ $value }}

      - alert: FreeIPAPortDown
        expr: probe_success{job="freeipa_tcp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "FreeIPA port unreachable: {{ $labels.instance }}"
          description: |
            TCP connection to {{ $labels.instance }} (FreeIPA) is failing
            for 2 minutes. Authentication, Kerberos, LDAP, or DNS services
            on the IPA master may be degraded.
            VALUE = {{ $value }}

      - alert: ApacheExporterDown
        expr: up{job="apache"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Apache exporter is DOWN"
          description: |
            Prometheus cannot scrape the Apache exporter at apache-exporter:9117.
            Apache metrics are no longer being collected.
            Check: docker ps | grep apache-exporter
            VALUE = {{ $value }}